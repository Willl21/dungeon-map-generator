[build]
command = "npm run build:client"
functions = "netlify/functions"
publish = "dist/spa"


[functions]
external_node_modules = ["express"]
node_bundler = "esbuild"
[[redirects]]
force = true
from = "/api/*"
status = 200
to = "/.netlify/functions/api/:splat"

# SPA fallback: setiap rute non-file dilayani index.html supaya React Router
# yang menangani (refresh/deep-link ke /dashboard, /generate, dll tidak 404).
# HARUS di bawah aturan /api/* agar tidak menimpanya.
[[redirects]]
from = "/*"
to = "/index.html"
status = 200
